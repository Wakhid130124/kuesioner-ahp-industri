<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuesioner AHP</title>
<style>
  :root {
    --ink: #1E3A5F;
    --ink-soft: #3D5A80;
    --paper: #FAF7F0;
    --paper-raised: #FFFFFF;
    --line: #D9D2C2;
    --gold: #B8863B;
    --gold-soft: #E9DCC0;
    --good: #2F6B4F;
    --bad: #A63D3D;
    --text: #2A2A28;
    --text-mute: #6B6558;
  }
  * { box-sizing: border-box; }
  .ahp-root {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--paper);
    color: var(--text);
    min-height: 100%;
    padding: 0;
    line-height: 1.55;
  }
  .ahp-shell {
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }
  .ahp-mast {
    border-bottom: 3px solid var(--ink);
    padding-bottom: 18px;
    margin-bottom: 24px;
  }
  .ahp-eyebrow {
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .ahp-title {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
    margin: 0 0 4px;
    line-height: 1.25;
  }
  .ahp-subtitle {
    font-size: 14px;
    color: var(--text-mute);
    font-style: italic;
  }
  .ahp-progress {
    display: flex;
    gap: 4px;
    margin: 18px 0 0;
  }
  .ahp-progress-seg {
    flex: 1;
    height: 5px;
    border-radius: 3px;
    background: var(--line);
    transition: background 0.3s;
  }
  .ahp-progress-seg.done { background: var(--gold); }
  .ahp-progress-seg.current { background: var(--ink-soft); }
  .ahp-step-label {
    font-size: 12px;
    color: var(--text-mute);
    margin-top: 8px;
    letter-spacing: 0.03em;
  }

  .ahp-card {
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 24px 22px;
    margin-bottom: 18px;
    box-shadow: 0 1px 2px rgba(30,58,95,0.04);
  }
  .ahp-h2 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 19px;
    color: var(--ink);
    margin: 0 0 14px;
    font-weight: 700;
  }
  .ahp-p { font-size: 14.5px; color: var(--text); margin: 0 0 12px; }
  .ahp-note {
    font-size: 13px;
    color: var(--text-mute);
    background: var(--gold-soft);
    border-left: 3px solid var(--gold);
    padding: 10px 14px;
    border-radius: 4px;
    margin: 12px 0;
  }

  .ahp-scale-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
  .ahp-scale-table th, .ahp-scale-table td {
    border: 1px solid var(--line);
    padding: 7px 10px;
    text-align: left;
  }
  .ahp-scale-table th { background: var(--ink); color: white; font-weight: 600; }
  .ahp-scale-table td:first-child { text-align: center; font-weight: 700; color: var(--ink); width: 70px; }

  .ahp-field { margin-bottom: 16px; }
  .ahp-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 5px;
  }
  .ahp-input, .ahp-select {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    background: var(--paper-raised);
    color: var(--text);
  }
  .ahp-input:focus, .ahp-select:focus {
    outline: 2px solid var(--ink-soft);
    outline-offset: 1px;
    border-color: var(--ink-soft);
  }

  .ahp-pair-block { margin-bottom: 28px; }
  .ahp-pair-labels {
    display: flex;
    justify-content: space-between;
    font-size: 13.5px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .ahp-pair-labels span:last-child { text-align: right; }
  .ahp-scale-row {
    display: flex;
    gap: 3px;
    justify-content: space-between;
  }
  .ahp-scale-btn {
    flex: 1;
    min-width: 0;
    aspect-ratio: 1;
    border: 1.5px solid var(--line);
    background: var(--paper-raised);
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-mute);
    cursor: pointer;
    transition: all 0.12s;
    padding: 0;
  }
  .ahp-scale-btn:hover { border-color: var(--ink-soft); }
  .ahp-scale-btn.mid { border-color: var(--gold); }
  .ahp-scale-btn.selected {
    background: var(--ink);
    border-color: var(--ink);
    color: white;
    transform: scale(1.08);
  }
  .ahp-scale-btn.selected.mid { background: var(--gold); border-color: var(--gold); }
  .ahp-scale-hint {
    display: flex;
    justify-content: space-between;
    font-size: 10.5px;
    color: var(--text-mute);
    margin-top: 4px;
  }

  .ahp-cr-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12.5px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 20px;
    margin-top: 6px;
  }
  .ahp-cr-badge.good { background: #E4F0E8; color: var(--good); }
  .ahp-cr-badge.bad { background: #F5E4E4; color: var(--bad); }
  .ahp-cr-badge.pending { background: var(--line); color: var(--text-mute); }

  .ahp-nav {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-top: 22px;
  }
  .ahp-btn {
    padding: 11px 22px;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    font-family: inherit;
  }
  .ahp-btn-primary { background: var(--ink); color: white; }
  .ahp-btn-primary:hover { background: var(--ink-soft); }
  .ahp-btn-primary:disabled { background: var(--line); color: var(--text-mute); cursor: not-allowed; }
  .ahp-btn-ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--line); }
  .ahp-btn-ghost:hover { border-color: var(--ink); }

  .ahp-done-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--good); color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin: 0 auto 16px;
  }
  .ahp-footer-link {
    text-align: center;
    margin-top: 30px;
    font-size: 12px;
    color: var(--text-mute);
  }
  .ahp-footer-link button {
    background: none; border: none; color: var(--text-mute);
    text-decoration: underline; cursor: pointer; font-size: 12px; font-family: inherit;
  }

  .ahp-admin-table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-top: 10px; }
  .ahp-admin-table th, .ahp-admin-table td {
    border: 1px solid var(--line); padding: 6px 8px; text-align: left;
  }
  .ahp-admin-table th { background: var(--ink); color: white; }
  .ahp-weight-bar-wrap { background: var(--line); border-radius: 4px; overflow: hidden; height: 16px; width: 100%; }
  .ahp-weight-bar { background: var(--gold); height: 100%; }
</style>
</head>
<body>

<div class="ahp-root" id="ahpRoot"></div>

<script>
(function(){

  // ---------- DATA MODEL ----------
  var L1_PAIRS = [
    { a: 'Keselamatan', b: 'Kesehatan' },
    { a: 'Keselamatan', b: 'Kenyamanan' },
    { a: 'Keselamatan', b: 'Kemudahan' },
    { a: 'Kesehatan', b: 'Kenyamanan' },
    { a: 'Kesehatan', b: 'Kemudahan' },
    { a: 'Kenyamanan', b: 'Kemudahan' }
  ];

  var L2_GROUPS = {
    keselamatan: {
      label: 'Subkriteria Keselamatan',
      items: ['Sistem Struktur Bangunan Gedung', 'Sistem Proteksi Bahaya Kebakaran', 'Sistem Penangkal Petir', 'Sistem Instalasi Listrik'],
      pairs: [[0,1],[0,2],[0,3],[1,2],[1,3],[2,3]]
    },
    kesehatan: {
      label: 'Subkriteria Kesehatan',
      items: ['Sistem Penghawaan', 'Sistem Pencahayaan', 'Sanitasi & Pengelolaan Limbah', 'Penggunaan Bahan Bangunan'],
      pairs: [[0,1],[0,2],[0,3],[1,2],[1,3],[2,3]]
    },
    kenyamanan: {
      label: 'Subkriteria Kenyamanan',
      items: ['Ruang Gerak & Hub. Antarruang', 'Kondisi Udara Dalam Ruang', 'Pandangan Dari/Ke Bangunan', 'Getaran & Kebisingan'],
      pairs: [[0,1],[0,2],[0,3],[1,2],[1,3],[2,3]]
    },
    kemudahan: {
      label: 'Subkriteria Kemudahan',
      items: ['Hubungan Horizontal Antarruang', 'Hubungan Vertikal Antarlantai', 'Kelengkapan Prasarana & Sarana'],
      pairs: [[0,1],[0,2],[1,2]]
    }
  };

  var L1_ITEMS = ['Keselamatan', 'Kesehatan', 'Kenyamanan', 'Kemudahan'];
  var L1_PAIR_INDEX = [[0,1],[0,2],[0,3],[1,2],[1,3],[2,3]];
  var PIE_COLORS = ['#1E3A5F', '#B8863B', '#3D5A80', '#8C6D46', '#5C7A99', '#C9A15C'];

  var RI_TABLE = { 1:0, 2:0, 3:0.58, 4:0.9, 5:1.12, 6:1.24, 7:1.32, 8:1.41, 9:1.45, 10:1.49 };

  // ---------- PENELITI ----------
  var RESEARCHER_WHATSAPP = '6281253231682'; 
  var RESEARCHER_EMAIL = 'wakhid.41124818@mhs.polines.ac.id';
  var RESEARCHER_NAME = 'Wakhid Abdul Hadi';
  
  // ---------- LINK SUDAH SAYA MASUKKAN OTOMATIS DISINI ----------
  var GOOGLE_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzsLpS76Q25kfdSgJeopgOYpc_0rl84nooYHP-NQOHgXQylhsIsfd7fxcrN-96cYxL5/exec';
  // ------------------------------------------------------------------

  var ADMIN_ACCESS_CODE = 'ahp-industri-2026';

  var SCALE = [9,8,7,6,5,4,3,2,1,2,3,4,5,6,7,8,9]; 

  var STEPS = ['intro','identity','l1','l2_keselamatan','l2_kesehatan','l2_kenyamanan','l2_kemudahan','review','done'];
  var STEP_LABELS = {
    intro: 'Petunjuk Pengisian',
    identity: 'Identitas Responden',
    l1: 'Perbandingan Kriteria (Level 1)',
    l2_keselamatan: 'Subkriteria Keselamatan',
    l2_kesehatan: 'Subkriteria Kesehatan',
    l2_kenyamanan: 'Subkriteria Kenyamanan',
    l2_kemudahan: 'Subkriteria Kemudahan',
    review: 'Tinjau & Kirim',
    done: 'Selesai'
  };

  // ---------- STATE ----------
  var state = {
    stepIndex: 0,
    adminMode: false,
    adminUnlocked: false,
    identity: { nama: '', instansi: '', jabatan: '', jabatanLainnya: '', keahlian: '', pengalaman: '', sertifikasi: '', nomorSkk: '' },
    l1: [null, null, null, null, null, null],
    l2: {
      keselamatan: [null,null,null,null,null,null],
      kesehatan: [null,null,null,null,null,null],
      kenyamanan: [null,null,null,null,null,null],
      kemudahan: [null,null,null]
    },
    submitting: false,
    submitError: '',
    lastFilename: '',
    lastChannel: '',
    importedResponses: [],
    importError: '',
    adminData: null,
    adminLoading: false,
    adminError: '',
    adminTab: 'kriteria',
    adminOpenRespondent: null
  };

  // ---------- AHP MATH ----------
  function buildMatrixFromSelections(n, pairs, selections) {
    var M = [];
    for (var i=0;i<n;i++){ M.push(new Array(n).fill(1)); }
    for (var k=0;k<pairs.length;k++){
      var i = pairs[k][0], j = pairs[k][1];
      var idx = selections[k];
      var aij = 1;
      if (idx !== null && idx !== undefined) {
        var val = SCALE[idx];
        if (idx < 8) aij = val;            
        else if (idx > 8) aij = 1/val;      
        else aij = 1;                       
      }
      M[i][j] = aij;
      M[j][i] = 1/aij;
    }
    return M;
  }

  function computeWeightsAndCR(M) {
    var n = M.length;
    var gm = M.map(function(row){
      var prod = row.reduce(function(p,v){ return p*v; }, 1);
      return Math.pow(prod, 1/n);
    });
    var sum = gm.reduce(function(a,b){return a+b;},0);
    var w = gm.map(function(v){ return v/sum; });
    var Mw = M.map(function(row){
      return row.reduce(function(s,v,j){ return s + v*w[j]; }, 0);
    });
    var ratios = Mw.map(function(v,i){ return v / w[i]; });
    var lambdaMax = ratios.reduce(function(a,b){return a+b;},0) / n;
    var CI = (lambdaMax - n) / (n - 1 || 1);
    var RI = RI_TABLE[n] || 1.49;
    var CR = RI === 0 ? 0 : CI / RI;
    return { weights: w, CR: CR, lambdaMax: lambdaMax };
  }

  function allFilled(arr) { return arr.every(function(v){ return v !== null && v !== undefined; }); }

  function groupResult(groupKey) {
    var g = L2_GROUPS[groupKey];
    var sel = state.l2[groupKey];
    if (!allFilled(sel)) return null;
    var M = buildMatrixFromSelections(g.items.length, g.pairs, sel);
    return computeWeightsAndCR(M);
  }

  // JALUR NAVIGASI & REDIRECT UNTUK OPSI 1
  function l1Result() {
    if (!allFilled(state.l1)) return null;
    var M = buildMatrixFromSelections(4, L1_PAIR_INDEX, state.l1);
    return computeWeightsAndCR(M);
  }

  function withTimeout(promise, ms, timeoutMessage) {
    return Promise.race([
      promise,
      new Promise(function(_, reject){
        setTimeout(function(){ reject(new Error(timeoutMessage)); }, ms);
      })
    ]);
  }

  function downloadJSON(filename, dataObj) {
    var blob = new window.Blob([JSON.stringify(dataObj, null, 2)], {type:'application/json'});
    var url = window.URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ window.URL.revokeObjectURL(url); }, 1000);
  }

  function buildPayload() {
    return {
      identity: state.identity,
      l1: state.l1,
      l2: state.l2,
      submittedAt: new Date().toISOString()
    };
  }

  function buildMessageText(payload) {
    return 'Jawaban Kuesioner AHP\nNama: ' + (payload.identity.nama || '-') +
      '\nInstansi: ' + (payload.identity.instansi || '-') +
      '\n\nMohon jangan diedit, teks di bawah ini dibaca otomatis oleh peneliti:\n[DATA-AHP]' + JSON.stringify(payload) + '[/DATA-AHP]';
  }

  function openWhatsAppFallback(payload) {
    var link = 'https://wa.me/' + RESEARCHER_WHATSAPP + '?text=' + encodeURIComponent(buildMessageText(payload));
    window.open(link, '_blank');
  }

  function downloadResponseFile() {
    var payload = buildPayload();
    var slug = (state.identity.nama || 'anon').toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,40);
    var filename = 'jawaban-ahp-' + slug + '.json';
    downloadJSON(filename, payload);
    state.lastFilename = filename;
    state.lastChannel = 'file';
    goStep('done');
  }

  // PENGIRIMAN DATA KE GOOGLE SHEETS VIA FETCH API
  async function submitResponse() {
    state.submitting = true; state.submitError = ''; render();
    var payload = buildPayload();
    
    try {
      await withTimeout(
        fetch(GOOGLE_WEB_APP_URL, {
          method: 'POST',
          mode: 'no-cors', 
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        }),
        10000,
        'Waktu tunggu habis (Koneksi lambat)'
      );

      state.submitting = false;
      state.lastChannel = 'storage';
      goStep('done');
    } catch (e) {
      console.warn('Penyimpanan otomatis gagal, beralih ke WhatsApp:', e);
      state.submitting = false;
      try {
        openWhatsAppFallback(payload);
        state.lastChannel = 'whatsapp-fallback';
        goStep('done');
      } catch (e2) {
        console.error('Fallback WhatsApp juga gagal:', e2);
        state.submitError = 'Gagal mengirim jawaban secara otomatis. Silakan tekan tombol di bawah untuk mengunduh jawaban Anda sebagai file, lalu kirim manual.';
        render();
      }
    }
  }

  function aggregateGroup(groupKeyOrL1, itemsCount, pairs, responses) {
    var n = itemsCount;
    var cellLists = {};
    var validCount = 0;
    responses.forEach(function(r){
      var sel = groupKeyOrL1 === 'l1' ? r.l1 : r.l2[groupKeyOrL1];
      if (!sel || !allFilled(sel)) return;
      var M = buildMatrixFromSelections(n, pairs, sel);
      var indiv = computeWeightsAndCR(M);
      if (indiv.CR > 0.1) return; // hanya responden konsisten yang dihitung di bobot akhir
      validCount++;
      for (var i=0;i<n;i++) for (var j=0;j<n;j++){
        var k = i+'_'+j;
        if (!cellLists[k]) cellLists[k] = [];
        cellLists[k].push(M[i][j]);
      }
    });
    var agg = [];
    for (var i=0;i<n;i++){ agg.push(new Array(n).fill(1)); }
    for (var i=0;i<n;i++) for (var j=0;j<n;j++){
      var list = cellLists[i+'_'+j];
      if (list && list.length) {
        var prod = list.reduce(function(p,v){return p*v;},1);
        agg[i][j] = Math.pow(prod, 1/list.length);
      }
    }
    var res = computeWeightsAndCR(agg);
    res.n = validCount;
    return res;
  }

  function promptAdminAccess() {
    var code = window.prompt('Masukkan kode akses peneliti:');
    if (code === null) return;
    if (code.trim() === ADMIN_ACCESS_CODE) {
      state.adminMode = true;
      loadAdminData();
    } else {
      window.alert('Kode akses salah.');
    }
  }

  async function loadAdminData() {
    state.adminLoading = true;
    state.adminError = '';
    state.adminOpenRespondent = null;
    render();
    try {
      var response = await withTimeout(
        fetch(GOOGLE_WEB_APP_URL + '?action=list'),
        15000,
        'Waktu tunggu habis (koneksi lambat)'
      );
      var json = await response.json();
      if (json.status !== 'success') throw new Error(json.message || 'Format data tidak dikenali');
      state.adminData = json.data;
    } catch (e) {
      state.adminError = 'Gagal memuat data dari Google Sheets: ' + e.message +
        '. Pastikan deployment Apps Script sudah versi terbaru dan akses diset ke "Siapa saja" (Anyone).';
      state.adminData = null;
    }
    state.adminLoading = false;
    render();
  }

  function computeResponseResults(r) {
    return {
      l1: (r.l1 && allFilled(r.l1)) ? computeWeightsAndCR(buildMatrixFromSelections(4, L1_PAIR_INDEX, r.l1)) : null,
      keselamatan: groupResultFor(r, 'keselamatan'),
      kesehatan: groupResultFor(r, 'kesehatan'),
      kenyamanan: groupResultFor(r, 'kenyamanan'),
      kemudahan: groupResultFor(r, 'kemudahan')
    };
  }

  function groupResultFor(r, groupKey) {
    var g = L2_GROUPS[groupKey];
    var sel = r.l2 && r.l2[groupKey];
    if (!sel || !allFilled(sel)) return null;
    return computeWeightsAndCR(buildMatrixFromSelections(g.items.length, g.pairs, sel));
  }

  // ---------- NAVIGATION ----------
  function goStep(name) {
    var idx = STEPS.indexOf(name);
    if (idx >= 0) state.stepIndex = idx;
    window.scrollTo({top:0, behavior:'smooth'});
    render();
  }
  function nextStep() { goStep(STEPS[state.stepIndex+1]); }
  function prevStep() { goStep(STEPS[state.stepIndex-1]); }

  function canProceedIdentity() {
    var id = state.identity;
    var hasSkk = id.sertifikasi && id.sertifikasi !== 'Lainnya/Tidak Memiliki';
    var skkOk = !hasSkk || (id.nomorSkk && id.nomorSkk.trim());
    return id.nama.trim() && id.instansi.trim() && id.jabatan.trim() && id.keahlian && id.pengalaman && id.sertifikasi && skkOk;
  }

  // ---------- RENDER HELPERS ----------
  function el(tag, attrs, children) {
    var e = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function(k){
      if (attrs[k] === null || attrs[k] === undefined) return;
      if (k === 'class') e.className = attrs[k];
      else if (k === 'html') e.innerHTML = attrs[k];
      else if (k.indexOf('on') === 0) e.addEventListener(k.slice(2), attrs[k]);
      else e.setAttribute(k, attrs[k]);
    });
    (children||[]).forEach(function(c){
      if (c === null || c === undefined) return;
      if (typeof c === 'string') e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    });
    return e;
  }

  function progressBar() {
    var visibleSteps = STEPS.slice(0, STEPS.length-1);
    var wrap = el('div', {});
    var bar = el('div', {class:'ahp-progress'});
    visibleSteps.forEach(function(s, i){
      var cls = 'ahp-progress-seg';
      if (i < state.stepIndex) cls += ' done';
      else if (i === state.stepIndex) cls += ' current';
      bar.appendChild(el('div', {class: cls}));
    });
    wrap.appendChild(bar);
    if (state.stepIndex < visibleSteps.length) {
      wrap.appendChild(el('div', {class:'ahp-step-label'}, [
        'Langkah ' + (state.stepIndex+1) + ' dari ' + visibleSteps.length + ' \u00b7 ' + STEP_LABELS[STEPS[state.stepIndex]]
      ]));
    }
    return wrap;
  }

  function crBadge(result) {
    if (!result) return el('span', {class:'ahp-cr-badge pending'}, ['Belum lengkap']);
    if (result.CR <= 0.1) {
      return el('span', {class:'ahp-cr-badge good'}, ['\u2713 Konsisten (CR = ' + result.CR.toFixed(3) + ')']);
    }

  // ---------- PIE CHART & RINGKASAN JAWABAN (helper) ----------
  function pieChart(items, weights, size) {
    size = size || 140;
    var wrap = el('div', {style:'display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin:10px 0;'});
    var acc = 0;
    var stops = [];
    items.forEach(function(item, i){
      var pct = weights[i] * 100;
      var start = acc, end = acc + pct;
      stops.push(PIE_COLORS[i % PIE_COLORS.length] + ' ' + start.toFixed(2) + '% ' + end.toFixed(2) + '%');
      acc = end;
    });
    var pie = el('div', {style:'width:' + size + 'px;height:' + size + 'px;border-radius:50%;flex-shrink:0;background:conic-gradient(' + stops.join(',') + ');box-shadow:0 1px 3px rgba(30,58,95,0.15);'});
    wrap.appendChild(pie);
    var legend = el('div', {style:'display:flex;flex-direction:column;gap:6px;'});
    items.forEach(function(item, i){
      var pct = (weights[i] * 100).toFixed(1);
      var row = el('div', {style:'display:flex;align-items:center;gap:8px;font-size:12.5px;'});
      row.appendChild(el('span', {style:'width:11px;height:11px;border-radius:3px;flex-shrink:0;background:' + PIE_COLORS[i % PIE_COLORS.length] + ';'}));
      row.appendChild(el('span', {style:'color:var(--text);'}, [item + ' \u2014 ' + pct + '%']));
      legend.appendChild(row);
    });
    wrap.appendChild(legend);
    return wrap;
  }

  function weightGroupHeader(title, result) {

    row.appendChild(el('span', {style:'font-size:13.5px;font-weight:700;color:var(--ink);'}, [title]));
    row.appendChild(el('span', {style:'font-size:11.5px;color:var(--text-mute);'}, [
      result && result.n > 0 ? ('n = ' + result.n + ' \u00b7 CR = ' + result.CR.toFixed(3)) : 'Belum ada data konsisten'
    ]));
    return row;
  }

  function pairCompareRow(a, b, selIdx) {
    var pct = (selIdx / 16) * 100;
    var wrap = el('div', {style:'margin-bottom:16px;'});
    wrap.appendChild(el('div', {style:'display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--ink);margin-bottom:6px;'}, [
      el('span', {}, [a]), el('span', {}, [b])
    ]));
    var track = el('div', {style:'position:relative;height:6px;background:var(--line);border-radius:3px;margin:0 8px;'});
    track.appendChild(el('div', {style:'position:absolute;left:50%;top:-4px;width:2px;height:14px;background:var(--text-mute);opacity:0.45;transform:translateX(-50%);'}));
    if (pct < 50) {
      track.appendChild(el('div', {style:'position:absolute;left:' + pct + '%;top:0;width:' + (50 - pct) + '%;height:100%;background:var(--ink);border-radius:3px;'}));
    } else if (pct > 50) {
      track.appendChild(el('div', {style:'position:absolute;left:50%;top:0;width:' + (pct - 50) + '%;height:100%;background:var(--gold);border-radius:3px;'}));
    }
    var dotColor = pct === 50 ? 'var(--text-mute)' : (pct < 50 ? 'var(--ink)' : 'var(--gold)');
    track.appendChild(el('div', {style:'position:absolute;left:' + pct + '%;top:50%;width:13px;height:13px;border-radius:50%;background:' + dotColor + ';transform:translate(-50%,-50%);box-shadow:0 1px 3px rgba(30,58,95,0.3);'}));
    wrap.appendChild(track);
    var val = SCALE[selIdx];
    var desc = (selIdx === 8) ? 'Setara pentingnya' :
      (selIdx < 8 ? (a + ' lebih penting \u00b7 skala ' + val) : (b + ' lebih penting \u00b7 skala ' + val));
    wrap.appendChild(el('div', {style:'text-align:center;font-size:11px;color:var(--text-mute);margin-top:5px;'}, [desc]));
    return wrap;
  }

      class:'ahp-btn ahp-btn-ghost', style:'margin-bottom:16px;',
      onclick: function(){ state.adminMode = false; render(); }
    }, ['\u2190 Kembali ke Kuesioner']));

    if (state.adminLoading) {
      card.appendChild(el('p', {class:'ahp-p'}, ['Memuat data dari Google Sheets...']));
      return card;
    }

    if (state.adminError) {
      card.appendChild(el('div', {class:'ahp-note', style:'border-color:var(--bad);background:#F5E4E4;color:var(--bad);'}, [state.adminError]));
      card.appendChild(el('button', {class:'ahp-btn ahp-btn-primary', style:'margin-top:10px;', onclick: loadAdminData}, ['Coba Lagi']));
      return card;
    }

    if (!state.adminData || !state.adminData.length) {
      card.appendChild(el('p', {class:'ahp-p'}, ['Belum ada data responden yang masuk.']));
      card.appendChild(el('button', {class:'ahp-btn ahp-btn-ghost', style:'margin-top:10px;', onclick: loadAdminData}, ['Muat Ulang']));
      return card;
    }

    var toolbar = el('div', {style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;'});
    toolbar.appendChild(el('span', {style:'font-size:12.5px;color:var(--text-mute);'}, [state.adminData.length + ' responden masuk']));
    toolbar.appendChild(el('button', {class:'ahp-btn ahp-btn-ghost', onclick: loadAdminData}, ['\u21bb Muat Ulang Data']));
    card.appendChild(toolbar);

    card.appendChild(adminTabs());

    if (state.adminTab === 'subkriteria') {
      card.appendChild(renderAdminSubkriteria());
    } else if (state.adminTab === 'jawaban') {
      card.appendChild(renderAdminJawaban());
    } else {
      card.appendChild(renderAdminKriteria());
    }

    return card;
  }

  // ---------- MAIN RENDER ----------
  function render() {
    var root = document.getElementById('ahpRoot');
    root.innerHTML = '';
    var shell = el('div', {class:'ahp-shell'});

    var mast = el('div', {class:'ahp-mast'});
    mast.appendChild(el('div', {class:'ahp-eyebrow'}, ['Kuesioner Penelitian \u00b7 AHP']));
    mast.appendChild(el('div', {class:'ahp-title'}, ['Pembobotan Kriteria Keandalan Bangunan Gedung Industri']));
    mast.appendChild(el('div', {class:'ahp-subtitle'}, ['Untuk Bangunan Gedung Industri (Pabrik) di Indonesia']));
    if (!state.adminMode) mast.appendChild(progressBar());
    shell.appendChild(mast);

    if (state.adminMode) {
      shell.appendChild(renderAdmin());
      root.appendChild(shell);
      return;
    }

    var stepName = STEPS[state.stepIndex];
    var content;
    if (stepName === 'intro') content = renderIntro();
    else if (stepName === 'identity') content = renderIdentity();
    else if (stepName === 'l1') content = renderL1();
    else if (stepName === 'l2_keselamatan') content = renderL2('keselamatan');
    else if (stepName === 'l2_kesehatan') content = renderL2('kesehatan');
    else if (stepName === 'l2_kenyamanan') content = renderL2('kenyamanan');
    else if (stepName === 'l2_kemudahan') content = renderL2('kemudahan');
    else if (stepName === 'review') content = renderReview();
    else if (stepName === 'done') content = renderDone();
    shell.appendChild(content);

    if (stepName !== 'done' && stepName !== 'review') {
      var nav = el('div', {class:'ahp-nav'});
      if (state.stepIndex > 0) {
        nav.appendChild(el('button', {class:'ahp-btn ahp-btn-ghost', onclick: prevStep}, ['\u2190 Kembali']));
      } else {
        nav.appendChild(el('div', {}));
      }
      var nextDisabled = false;
      if (stepName === 'identity') {
        nextDisabled = !canProceedIdentity();
      } else if (stepName === 'l1') {
        var r = l1Result();
        nextDisabled = !r || r.CR > 0.1;
      } else if (stepName === 'l2_keselamatan' || stepName === 'l2_kesehatan' || stepName === 'l2_kenyamanan' || stepName === 'l2_kemudahan') {
        var gk = stepName.replace('l2_', '');
        var gr = groupResult(gk);
        nextDisabled = !gr || gr.CR > 0.1;
      }
      nav.appendChild(el('button', {
        class:'ahp-btn ahp-btn-primary',
        disabled: nextDisabled ? 'disabled' : null,
        onclick: nextStep
      }, ['Lanjut \u2192']));
      shell.appendChild(nav);
    } else if (stepName === 'review') {
      var nav2 = el('div', {class:'ahp-nav'});
      nav2.appendChild(el('button', {class:'ahp-btn ahp-btn-ghost', onclick: prevStep}, ['\u2190 Kembali']));
      shell.appendChild(nav2);
    }

    root.appendChild(shell);
  }

  render();
})();
</script>
</body>
</html>
